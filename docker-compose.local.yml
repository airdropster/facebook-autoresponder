services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - logs_data:/app/logs
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sqlite_data:
  logs_data:
